
<style>
#erd8 { padding: 8px 0; }
#erd8 svg { max-width: 100%; }
</style>
<div id="erd8"></div>
<script type="module">
import mermaid from 'https://esm.sh/mermaid@11/dist/mermaid.esm.min.mjs';
const dark = matchMedia('(prefers-color-scheme: dark)').matches;
await document.fonts.ready;
mermaid.initialize({
  startOnLoad: false,
  theme: 'base',
  fontFamily: '"Anthropic Sans", sans-serif',
  themeVariables: {
    darkMode: dark,
    fontSize: '13px',
    fontFamily: '"Anthropic Sans", sans-serif',
    lineColor: dark ? '#9c9a92' : '#73726c',
    textColor: dark ? '#c2c0b6' : '#3d3d3a',
    primaryColor: dark ? '#3C3489' : '#EEEDFE',
    primaryTextColor: dark ? '#CECBF6' : '#26215C',
    primaryBorderColor: dark ? '#534AB7' : '#AFA9EC',
    secondaryColor: dark ? '#085041' : '#E1F5EE',
    tertiaryColor: dark ? '#3C3489' : '#EEEDFE',
  },
});

const diagram = `erDiagram
  customers ||--o{ orders : "สั่งซื้อ"
  products ||--o{ orders : "อยู่ในคำสั่งซื้อ"
  suppliers ||--o{ products : "จัดจำหน่ายสินค้า"
  couriers ||--o{ orders : "รับผิดชอบขนส่ง"
  orders ||--o{ returns : "อาจถูกคืนสินค้า"
  orders ||--o{ risk_scores : "ถูกประเมินความเสี่ยง"
  promotions ||--o{ orders : "ใช้ส่วนลดแคมเปญ"

  customers {
    VARCHAR customer_id PK
    VARCHAR customer_name
    VARCHAR customer_phone
    VARCHAR gender
    INTEGER age
    VARCHAR membership_tier
    VARCHAR preferred_channel
    VARCHAR province
    DATE registration_date
    INTEGER customer_age_days
  }

  products {
    VARCHAR product_id PK
    VARCHAR product_name
    VARCHAR category
    VARCHAR brand
    VARCHAR supplier_id FK
    NUMERIC unit_price
    BOOLEAN is_fragile
    FLOAT product_rating
  }

  suppliers {
    VARCHAR supplier_id PK
    VARCHAR supplier_name
    VARCHAR contact
  }

  couriers {
    VARCHAR courier_id PK
    VARCHAR courier_name
    VARCHAR courier_type
    NUMERIC avg_delivery_days
    NUMERIC damage_rate
    VARCHAR coverage_region
  }

  promotions {
    VARCHAR promo_id PK
    VARCHAR promo_name
    VARCHAR promo_type
    NUMERIC discount_rate
    DATE start_date
    DATE end_date
  }

  orders {
    VARCHAR order_id PK
    VARCHAR customer_id FK
    VARCHAR product_id FK
    VARCHAR courier_id FK
    VARCHAR promo_id FK
    TIMESTAMP order_date
    TIMESTAMP expected_delivery_date
    TIMESTAMP delivery_date
    INTEGER delivery_time_expected_days
    VARCHAR channel_type
    VARCHAR payment_method
    INTEGER quantity
    NUMERIC unit_price
    NUMERIC tier_discount_pct
    NUMERIC campaign_discount_pct
    NUMERIC total_discount_pct
    NUMERIC discount_applied_amount
    NUMERIC total_amount
    INTEGER delivery_days
    BOOLEAN is_repurchased_item
    INTEGER order_hour
    INTEGER days_since_last_order
    INTEGER hist_order_count
    NUMERIC hist_return_rate
    SMALLINT is_returned
  }

  returns {
    VARCHAR return_id PK
    VARCHAR order_id FK
    VARCHAR customer_id FK
    DATE return_date
    VARCHAR return_reason
    VARCHAR return_scenario
    VARCHAR item_condition
    VARCHAR return_status
    NUMERIC refund_amount
  }

  risk_scores {
    VARCHAR score_id PK
    VARCHAR order_id FK
    NUMERIC risk_score
    VARCHAR risk_tier
    TIMESTAMP scored_at
    JSONB shap_values
  }
`;

const { svg } = await mermaid.render('erd8-svg', diagram);
document.getElementById('erd8').innerHTML = svg;

document.querySelectorAll('#erd8 svg .node').forEach(node => {
  const firstPath = node.querySelector('path[d]');
  if (!firstPath) return;
  const d = firstPath.getAttribute('d');
  const nums = d.match(/-?[\d.]+/g)?.map(Number);
  if (!nums || nums.length < 8) return;
  const xs = [nums[0], nums[2], nums[4], nums[6]];
  const ys = [nums[1], nums[3], nums[5], nums[7]];
  const x = Math.min(...xs), y = Math.min(...ys);
  const w = Math.max(...xs) - x, h = Math.max(...ys) - y;
  const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
  rect.setAttribute('x', x); rect.setAttribute('y', y);
  rect.setAttribute('width', w); rect.setAttribute('height', h);
  rect.setAttribute('rx', '8');
  for (const a of ['fill', 'stroke', 'stroke-width', 'class', 'style']) {
    if (firstPath.hasAttribute(a)) rect.setAttribute(a, firstPath.getAttribute(a));
  }
  firstPath.replaceWith(rect);
});

document.querySelectorAll('#erd8 svg .row-rect-odd path, #erd8 svg .row-rect-even path').forEach(p => {
  p.setAttribute('stroke', 'none');
});
</script>
